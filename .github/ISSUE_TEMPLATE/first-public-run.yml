name: First public run proposal
description: Propose a bounded TARMAC source-backed aviation-network analysis run.
title: "First public run: "
labels: ["first-run", "evidence-needed"]
body:
  - type: markdown
    attributes:
      value: |
        Use this to scope one bounded TARMAC run. Public reuse does not create engineering, procedure, environmental, slot, route-award, procurement, endorsement, or validation claims.
  - type: input
    id: scope
    attributes:
      label: Bounded scope
      placeholder: "Example: one regional airport connectivity and delay exposure"
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Aviation promise question
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Source surfaces
    validations:
      required: true
  - type: textarea
    id: held
    attributes:
      label: Claims that must stay held
    validations:
      required: true
